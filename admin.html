<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3B Admin | Secure Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-text { text-shadow: 0 0 15px #3b82f6; }
        .hidden-section { display: none; }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 36px; height: 36px;
            border-radius: 50%;
            border-left-color: #3b82f6;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center">

    <!-- 1. INITIAL LOADER -->
    <div id="authLoader" class="flex flex-col items-center gap-4">
        <div class="spinner"></div>
        <p class="text-gray-500 animate-pulse uppercase tracking-widest text-xs font-bold">Verifying System...</p>
    </div>

    <!-- 2. LOGIN SECTION -->
    <div id="loginSection" class="hidden-section w-full max-w-md p-8 glass rounded-[2.5rem] mx-4 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-blue-500 uppercase tracking-tighter neon-text">3B Secure Access</h1>
            <p class="text-gray-400 text-sm mt-2">Enter your admin credentials</p>
        </div>
        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block mb-2 text-[10px] font-black text-blue-400 uppercase tracking-widest ml-1">Admin Email</label>
                <input type="email" id="email" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:outline-none focus:border-blue-500 text-white transition-all" placeholder="admin@3bwebtech.com" required>
            </div>
            <div>
                <label class="block mb-2 text-[10px] font-black text-blue-400 uppercase tracking-widest ml-1">Password</label>
                <input type="password" id="password" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:outline-none focus:border-blue-500 text-white transition-all" placeholder="••••••••" required>
            </div>
            <button type="submit" id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl transition-all shadow-lg shadow-blue-600/30 uppercase tracking-widest text-sm">
                Unlock Dashboard
            </button>
        </form>
    </div>

    <!-- 3. DASHBOARD SECTION -->
    <div id="dashboardSection" class="hidden-section w-full max-w-7xl p-6 md:p-10 self-start">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 glass p-8 rounded-3xl gap-4">
            <div>
                <div class="flex items-center gap-2 mb-1">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <h1 class="text-3xl font-black text-white uppercase tracking-tighter">3B Project <span class="text-blue-500">Manager</span></h1>
                </div>
                <p class="text-gray-400 text-sm">Welcome back, 3B Developer. Manage your leads below.</p>
            </div>
            <button id="logoutBtn" class="bg-red-500/10 text-red-500 border border-red-500/20 px-8 py-3 rounded-xl font-bold hover:bg-red-600 hover:text-white transition-all text-xs uppercase tracking-widest">
                Logout System
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass p-8 rounded-3xl border-l-4 border-blue-500">
                <p class="text-gray-400 text-[10px] font-black uppercase tracking-widest">Total Requests</p>
                <h2 id="totalCount" class="text-5xl font-black mt-2">0</h2>
            </div>
            <div class="glass p-8 rounded-3xl">
                <p class="text-gray-400 text-[10px] font-black uppercase tracking-widest">Latest Update</p>
                <h2 class="text-lg font-bold mt-2 text-blue-400" id="currentDate">-- -- --</h2>
            </div>
            <div class="glass p-8 rounded-3xl">
                <p class="text-gray-400 text-[10px] font-black uppercase tracking-widest">Database</p>
                <h2 class="text-lg font-bold mt-2 text-green-400">Firebase Live</h2>
            </div>
        </div>

        <div class="glass rounded-[2.5rem] overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-white/5 border-b border-white/10">
                        <tr class="text-blue-400 text-[10px] uppercase tracking-[0.2em] font-black">
                            <th class="p-6">Client Identity</th>
                            <th class="p-6">Project Scope</th>
                            <th class="p-6">Budget Range</th>
                            <th class="p-6">Vision / Details</th>
                            <th class="p-6 text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="requestTableBody" class="divide-y divide-white/5">
                        <!-- Data flows here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA8c3pdrI7aC9Ur10OKTYDkMyrffEJyugg",
            authDomain: "bwebtech-1761e.firebaseapp.com",
            projectId: "bwebtech-1761e",
            storageBucket: "bwebtech-1761e.firebasestorage.app",
            messagingSenderId: "798698898101",
            appId: "1:798698898101:web:564f50225456299ae1b4fc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const authLoader = document.getElementById('authLoader');
        const loginSection = document.getElementById('loginSection');
        const dashboardSection = document.getElementById('dashboardSection');
        const loginForm = document.getElementById('loginForm');
        const tableBody = document.getElementById('requestTableBody');

        onAuthStateChanged(auth, (user) => {
            authLoader.style.display = "none";
            if (user) {
                loginSection.style.display = "none";
                dashboardSection.style.display = "block";
                document.body.classList.remove('justify-center');
                loadDashboardData();
                document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
            } else {
                loginSection.style.display = "block";
                dashboardSection.style.display = "none";
                document.body.classList.add('justify-center');
            }
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            btn.innerText = "Verifying...";
            btn.disabled = true;
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                alert("Login Failed!");
                btn.innerText = "Unlock Dashboard";
                btn.disabled = false;
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            if(confirm("Logout?")) signOut(auth);
        });

        function loadDashboardData() {
            const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                document.getElementById('totalCount').innerText = snapshot.size;
                tableBody.innerHTML = "";
                
                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const id = docSnap.id;
                    const date = data.timestamp ? data.timestamp.toDate().toLocaleDateString() : 'New';
                    
                    // WhatsApp Link Clean-up
                    const cleanPhone = data.phone_number ? data.phone_number.replace(/\D/g, '') : '';

                    tableBody.innerHTML += `
                        <tr class="hover:bg-white/[0.02] transition-all group">
                            <td class="p-6">
                                <div class="font-bold text-lg text-white mb-1">${data.full_name}</div>
                                
                                <!-- Clickable Email -->
                                <a href="mailto:${data.email}" class="block text-blue-400 text-xs hover:text-blue-300 transition-all mb-1">
                                    📧 ${data.email}
                                </a>

                                <!-- Clickable WhatsApp Number -->
                                <a href="https://wa.me/${cleanPhone}" target="_blank" class="block text-green-400 text-xs font-mono hover:text-green-300 transition-all">
                                    💬 ${data.phone_number}
                                </a>

                                <div class="text-[9px] text-gray-600 mt-2 uppercase font-bold">${date}</div>
                            </td>
                            <td class="p-6">
                                <span class="bg-blue-500/10 text-blue-400 text-[10px] font-black px-3 py-1 rounded-full uppercase border border-blue-500/20">
                                    ${data.service}
                                </span>
                            </td>
                            <td class="p-6 font-mono text-green-400 font-bold">${data.budget}</td>
                            <td class="p-6">
                                <p class="text-sm text-gray-400 max-w-xs leading-relaxed italic">${data.details}</p>
                            </td>
                            <td class="p-6 text-center">
                                <button onclick="deleteRecord('${id}')" class="text-gray-600 hover:text-red-500 transition-all text-[10px] font-black uppercase tracking-tighter">
                                    Remove Record
                                </button>
                            </td>
                        </tr>
                    `;
                });
            });
        }

        window.deleteRecord = async (id) => {
            if(confirm("Permanently delete?")) await deleteDoc(doc(db, "requests", id));
        };
    </script>
</body>
</html>
